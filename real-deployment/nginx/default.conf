
# --- HTTPS Server Block (Backend API) ---
# This block handles secure traffic for your API.
server {
    # listen 443 ssl;
    listen 80;

    server_name _;


    # Set document root for Laravel FastCGI params
    root /var/www/public;
    index index.php;
    client_max_body_size 50M;

    #This allows Let's Encrypt to verify your domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Handle storage files directly for better performance
    location /storage {
        alias /var/www/storage/app/public;
        try_files $uri $uri/ =404;
    }

    # Handle all dynamic requests via Laravel's front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to the Laravel (PHP-FPM) container
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass real-time-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Inform Laravel that the connection is secure
        # fastcgi_param HTTPS on;
    }

    location /app {
        proxy_pass http://real-time-reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to dotfiles (e.g., .htaccess)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Enable Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml;
    gzip_min_length 256;

    # Set browser caching for static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        expires 30d;
        access_log off;
    }
}


